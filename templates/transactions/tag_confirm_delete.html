{% extends 'base.html' %}

{% block title %}Delete Tag{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <i class="fas fa-exclamation-triangle me-2"></i>Delete Tag
            </div>
            <div class="card-body p-4 text-center">
                <p class="mb-3">Are you sure you want to delete the tag:</p>
                <span class="badge bg-{{ tag.color }} fs-5 px-3 py-2 mb-4">{{ tag.name }}</span>
                <p class="text-muted small">
                    This tag will be removed from all transactions that use it.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center mt-3">
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash me-1"></i>Yes, Delete
                        </button>
                        <a href="{% url 'tag_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
