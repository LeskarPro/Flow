<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="{% url 'dashboard' %}">
            <i class="fas fa-wallet me-2"></i>Flow
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">

            {% if user.is_authenticated %}
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
                       href="{% url 'dashboard' %}">
                        <i class="fas fa-home me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if 'transactions' in request.path %}active{% endif %}"
                       href="{% url 'transaction_list' %}">
                        <i class="fas fa-exchange-alt me-1"></i>Transactions
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if 'categories' in request.path %}active{% endif %}"
                       href="{% url 'category_list' %}">
                        <i class="fas fa-tags me-1"></i>Categories
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if 'goals' in request.path %}active{% endif %}"
                       href="{% url 'goal_list' %}">
                        <i class="fas fa-bullseye me-1"></i>Goals
                    </a>
                </li>
            </ul>

            <!-- Logged-in user menu -->
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle {% if 'users' in request.path %}active{% endif %}"
                       href="#" id="userDropdown" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-user-circle me-1"></i>{{ user.username }}
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                        <li>
                            <a class="dropdown-item" href="{% url 'profile' %}">
                                <i class="fas fa-user me-2 text-muted"></i>My Profile
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form method="post" action="{% url 'logout' %}">
                                {% csrf_token %}
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="fas fa-sign-out-alt me-2"></i>Sign Out
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>

            {% else %}
            <!-- Anonymous user links -->
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'login' %}active{% endif %}"
                       href="{% url 'login' %}">
                        <i class="fas fa-sign-in-alt me-1"></i>Sign In
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'register' %}active{% endif %}"
                       href="{% url 'register' %}">
                        <i class="fas fa-user-plus me-1"></i>Sign Up
                    </a>
                </li>
            </ul>
            {% endif %}

        </div>
    </div>
</nav>
